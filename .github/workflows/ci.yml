name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json, libxml, mbstring, pdo, pdo_sqlite, simplexml
          coverage: none

      - name: Validate Composer configuration
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Audit dependencies
        run: composer audit

      - name: Lint PHP files
        run: find src tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run tests
        run: composer test

  mariadb:
    name: MariaDB migrations
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: wps_micro_test
          MARIADB_USER: wps_micro
          MARIADB_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      WPS_TEST_MARIADB_HOST: 127.0.0.1
      WPS_TEST_MARIADB_PORT: 3306
      WPS_TEST_MARIADB_DATABASE: wps_micro_test
      WPS_TEST_MARIADB_USERNAME: wps_micro
      WPS_TEST_MARIADB_PASSWORD: secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, mbstring, pdo, pdo_mysql, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run MariaDB migration tests
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --filter testItMigratesAndRollsBackWithMariaDb
