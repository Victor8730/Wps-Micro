name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  assets:
    name: Frontend assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build assets
        run: npm run build

  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json, libxml, mbstring, pdo, pdo_sqlite, simplexml
          coverage: none

      - name: Validate Composer configuration
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Audit dependencies
        run: composer audit

      - name: Lint PHP files
        run: find application public -path application/vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run tests
        run: composer test
