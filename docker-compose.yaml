version: "3.3"

#Docker Services
services:
   nginx:
     container_name: wps-micro-nginx
     build:
       context: .
       dockerfile: docker/nginx.Dockerfile
     ports:
       - 80:80
     volumes:
         - ./:/var/www/wps-micro-docker
     networks:
       - app-network
   fpm:
     container_name: wps-micro-php-fpm
     build:
       context: .
       dockerfile: docker/fpm.Dockerfile
     volumes:
       - ./:/var/www/wps-micro-docker
     networks:
       - app-network
#Docker Networks
networks:
  app-network:
    driver: bridge
