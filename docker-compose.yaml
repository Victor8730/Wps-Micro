x-application-environment: &application-environment
  APP_URL: ${DOCKER_APP_URL:-http://localhost}
  VITE_DEV_SERVER_URL: ${VITE_DEV_SERVER_URL:-}
  DB_DRIVER: mysql
  DB_HOST: mariadb
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE:-wps_micro}
  DB_USERNAME: ${DB_USERNAME:-wps_micro}
  DB_PASSWORD: ${DB_PASSWORD:-secret}

services:
  nginx:
    container_name: wps-micro-nginx
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - 80:80
    volumes:
      - ./:/var/www/wps-micro-docker
    depends_on:
      assets:
        condition: service_completed_successfully
      fpm:
        condition: service_started
    networks:
      - app-network

  fpm:
    container_name: wps-micro-php-fpm
    build:
      context: .
      dockerfile: docker/fpm.Dockerfile
    environment: *application-environment
    volumes:
      - ./:/var/www/wps-micro-docker
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - app-network

  migrate:
    build:
      context: .
      dockerfile: docker/fpm.Dockerfile
    command: php application/console.php migrate
    working_dir: /var/www/wps-micro-docker
    environment: *application-environment
    volumes:
      - ./:/var/www/wps-micro-docker
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - app-network

  assets:
    image: node:24-alpine
    command: ["sh", "-c", "npm ci && npm run build"]
    working_dir: /var/www/wps-micro-docker
    volumes:
      - ./:/var/www/wps-micro-docker
      - node-modules:/var/www/wps-micro-docker/node_modules

  vite:
    image: node:24-alpine
    profiles:
      - dev
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    working_dir: /var/www/wps-micro-docker
    environment:
      VITE_BACKEND_ORIGIN: ${DOCKER_APP_URL:-http://localhost}
    ports:
      - 5173:5173
    volumes:
      - ./:/var/www/wps-micro-docker
      - node-modules:/var/www/wps-micro-docker/node_modules
    depends_on:
      assets:
        condition: service_completed_successfully

  mariadb:
    container_name: wps-micro-mariadb
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_DATABASE:-wps_micro}
      MARIADB_USER: ${DB_USERNAME:-wps_micro}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - ${DB_FORWARD_PORT:-3307}:3306
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mariadb-data:
  node-modules:
